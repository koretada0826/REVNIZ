<svg width="800" height="340" viewBox="0 0 800 340" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <!-- The master path for rotation -->
    <path id="orbitPath" d="M 400,220 A 320,60 0 1,1 400.01,220 Z" fill="none" />
  </defs>

  <style>
    .sponsor-link { cursor: pointer; text-decoration: none; }
    .logo-frame {
      stroke: #4F46E5;
      stroke-width: 1.5;
      stroke-dasharray: 240;
      stroke-dashoffset: 240;
      fill: rgba(255, 255, 255, 0.05);
      filter: url(#glow);
    }
    .initial {
      font-family: sans-serif;
      font-size: 14px;
      font-weight: bold;
      fill: #4F46E5;
      text-anchor: middle;
      dominant-baseline: central;
      opacity: 0;
    }
    .label {
      font-family: sans-serif;
      font-size: 10px;
      fill: #999;
      text-anchor: middle;
      opacity: 0;
    }

    /* Drawing animation */
    @keyframes drawFrame {
      0% { stroke-dashoffset: 240; opacity: 0.2; }
      30% { stroke-dashoffset: 0; opacity: 1; }
      70% { stroke-dashoffset: 0; opacity: 1; }
      100% { stroke-dashoffset: -240; opacity: 0.2; }
    }
    @keyframes fadeIn {
      0%, 20% { opacity: 0; }
      40%, 80% { opacity: 0.8; }
      100% { opacity: 0; }
    }

    .logo-frame-anim {
      animation: drawFrame 4s infinite linear;
    }
    .initial-anim {
      animation: fadeIn 4s infinite linear;
    }
  </style>

  <!-- Background Decorative Ring -->
  <ellipse cx="400" cy="160" rx="320" ry="60" fill="none" stroke="#F0F0F0" stroke-width="1" />

  <!-- Logo Generator -->
  <g>
    <!-- Template Logo G -->
    <script type="text/ecmascript">
