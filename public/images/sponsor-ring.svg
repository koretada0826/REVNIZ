          <animateTransform attributeName="transform" type="scale" dur="25s" repeatCount="indefinite" values="0.85;1.1;0.85;0.7;0.85" keyTimes="0;0.25;0.5;0.75;1" begin="-2.083s" />
          <text class="initial" y="0">NS</text>
