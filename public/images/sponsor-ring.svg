<svg width="800" height="480" viewBox="0 0 800 480" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 極薄いドロップシャドウ（デザイン要件のため） -->
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" />
      <feOffset dx="0" dy="2" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.05" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    /* 回転アニメーション（12秒リニア） */
    .plate-group {
      transform-origin: 400px 240px;
      animation: rotatePlate 12s linear infinite;
    }

    /* ロゴの可読性維持のための逆回転アニメーション */
    /* 親の回転を打ち消して常に正立するようにする */
    .logo-container {
      transform-origin: center;
      transform-box: fill-box;
      animation: counterRotate 12s linear infinite;
    }

    @keyframes rotatePlate {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    @keyframes counterRotate {
      from { transform: rotate(0deg); }
      to   { transform: rotate(-360deg); }
    }

    /* 以下はスタイル調整用のCSS */
    .plate-shape {
      fill: #FFFFFF;
      stroke: #E5E7EB;
      stroke-width: 1;
      filter: url(#softShadow);
    }

    .logo-text {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 20px;
      font-weight: bold;
      fill: #141414;
      text-anchor: middle;
      dominant-baseline: central;
    }

    .logo-subtext {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 10px;
      fill: #666;
      text-anchor: middle;
      dominant-baseline: hanging;
    }
  </style>

  <!-- 
    グループ全体（だ円プレート＋ロゴ）をまとめるコンテナ 
    この g タグに対して rotatePlate アニメーションが適用される
  -->
  <g id="ring" class="plate-group">
    
    <!-- 
      1枚の楕円プレート（ドーナツ状）。
      evenodd ルールを使うことで中をくり抜き、外側rx=300、内側rx=280のリングにしている
      （cx=400, cy=240）
    -->
    <path class="plate-shape" fill-rule="evenodd" clip-rule="evenodd"
      d="
        M 700 240 A 300 180 0 1 1 100 240 A 300 180 0 1 1 700 240 Z
        M 680 240 A 280 160 0 1 0 120 240 A 280 160 0 1 0 680 240 Z
      " 
    />

    <!--
      各ロゴ（外周ライン上に均等配置）
      座標ロジック:
      x = 400 + 300 * cos(θ)
      y = 240 + 180 * sin(θ)
      少し外側に配置するため r を微増（rx=330, ry=210）とする
      x = 400 + 330 * cos(θ)
      y = 240 + 210 * sin(θ)
    -->

    <!-- 0度: cos(0)=1, sin(0)=0 -->
    <g transform="translate(730, 240)">
      <g class="logo-container">
        <text class="logo-text" y="-6">TV</text>
        <text class="logo-subtext" y="10">テクノバレー</text>
      </g>
    </g>

    <!-- 30度: cos(30)=0.866, sin(30)=0.5 -->
    <!-- X = 400 + 330 * 0.866 = 685.8 -->
    <!-- Y = 240 + 210 * 0.5 = 345 -->
    <g transform="translate(685.8, 345)">
      <g class="logo-container">
        <text class="logo-text" y="-6">NS</text>
        <text class="logo-subtext" y="10">NextStep</text>
      </g>
    </g>

    <!-- 60度: cos(60)=0.5, sin(60)=0.866 -->
    <!-- X = 400 + 330 * 0.5 = 565 -->
    <!-- Y = 240 + 210 * 0.866 = 421.8 -->
    <g transform="translate(565, 421.8)">
      <g class="logo-container">
        <text class="logo-text" y="-6">CP</text>
        <text class="logo-subtext" y="10">CRAFT PR</text>
      </g>
    </g>

    <!-- 90度: cos(90)=0, sin(90)=1 -->
    <!-- X = 400 -->
    <!-- Y = 240 + 210 = 450 -->
    <g transform="translate(400, 450)">
      <g class="logo-container">
        <text class="logo-text" y="-6">LX</text>
        <text class="logo-subtext" y="10">LocalX</text>
      </g>
    </g>

    <!-- 120度: cos(120)=-0.5, sin(120)=0.866 -->
    <!-- X = 400 - 165 = 235 -->
    <!-- Y = 240 + 181.8 = 421.8 -->
    <g transform="translate(235, 421.8)">
      <g class="logo-container">
        <text class="logo-text" y="-6">BC</text>
        <text class="logo-subtext" y="10">Bridge C</text>
      </g>
    </g>

    <!-- 150度: cos(150)=-0.866, sin(150)=0.5 -->
    <!-- X = 400 - 285.8 = 114.2 -->
    <!-- Y = 240 + 105 = 345 -->
    <g transform="translate(114.2, 345)">
      <g class="logo-container">
        <text class="logo-text" y="-6">KC</text>
        <text class="logo-subtext" y="10">鹿児島建設</text>
      </g>
    </g>

    <!-- 180度: cos(180)=-1, sin(180)=0 -->
    <!-- X = 400 - 330 = 70 -->
    <!-- Y = 240 -->
    <g transform="translate(70, 240)">
      <g class="logo-container">
        <text class="logo-text" y="-6">SF</text>
        <text class="logo-subtext" y="10">南薩フーズ</text>
      </g>
    </g>

    <!-- 210度: cos(210)=-0.866, sin(210)=-0.5 -->
    <!-- X = 400 - 285.8 = 114.2 -->
    <!-- Y = 240 - 105 = 135 -->
    <g transform="translate(114.2, 135)">
      <g class="logo-container">
        <text class="logo-text" y="-6">KT</text>
        <text class="logo-subtext" y="10">霧島テック</text>
      </g>
    </g>

    <!-- 240度: cos(240)=-0.5, sin(240)=-0.866 -->
    <!-- X = 400 - 165 = 235 -->
    <!-- Y = 240 - 181.8 = 58.2 -->
    <g transform="translate(235, 58.2)">
      <g class="logo-container">
        <text class="logo-text" y="-6">SS</text>
        <text class="logo-subtext" y="10">薩摩サービス</text>
      </g>
    </g>

    <!-- 270度: cos(270)=0, sin(270)=-1 -->
    <!-- X = 400 -->
    <!-- Y = 240 - 210 = 30 -->
    <g transform="translate(400, 30)">
      <g class="logo-container">
        <text class="logo-text" y="-6">SR</text>
        <text class="logo-subtext" y="10">桜島リゾーツ</text>
      </g>
    </g>

    <!-- 300度: cos(300)=0.5, sin(300)=-0.866 -->
    <!-- X = 400 + 165 = 565 -->
    <!-- Y = 240 - 181.8 = 58.2 -->
    <g transform="translate(565, 58.2)">
      <g class="logo-container">
        <text class="logo-text" y="-6">RZ</text>
        <text class="logo-subtext" y="10">REVNIZ</text>
      </g>
    </g>

    <!-- 330度: cos(330)=0.866, sin(330)=-0.5 -->
    <!-- X = 400 + 285.8 = 685.8 -->
    <!-- Y = 240 - 105 = 135 -->
    <g transform="translate(685.8, 135)">
      <g class="logo-container">
        <text class="logo-text" y="-6">SD</text>
        <text class="logo-subtext" y="10">Spark Dig</text>
      </g>
    </g>
  </g>
</svg>
