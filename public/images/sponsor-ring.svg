<svg width="800" height="340" viewBox="0 0 800 340" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <!-- ドロップシャドウ（床に落ちる影） -->
    <filter id="plateShadow" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6" />
      <feOffset dx="0" dy="12" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.1" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- プレート上面のグラデーション（微細な光の反射） -->
    <linearGradient id="plateTopGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#F3F4F6" />
    </linearGradient>

    <!-- プレート側面のグラデーション（厚み部分の陰影） -->
    <linearGradient id="plateSideGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E5E7EB" />
      <stop offset="100%" stop-color="#D1D5DB" />
    </linearGradient>
    
    <!-- 時計周りの軌道パス (右 -> 手前 -> 左 -> 奥) -->
    <path id="orbitPath" d="M 720,170 A 320,70 0 0,1 80,170 A 320,70 0 0,1 720,170 Z" fill="none" />
  </defs>

  <style>
    .sponsor-link { 
      cursor: pointer; 
      text-decoration: none; 
    }
    .initial { 
      font-family: "Space Grotesk", "Noto Sans JP", sans-serif; 
      font-size: 24px; 
      font-weight: bold; 
      fill: #141414; 
      text-anchor: middle; 
      dominant-baseline: central; 
      transition: fill 0.3s ease;
      /* ロゴ自体にもフワッと浮くシャドウを追加 */
      filter: drop-shadow(0px 3px 4px rgba(0,0,0,0.08));
    }
    .tooltip-bg {
      fill: rgba(0,0,0,0.85);
      rx: 4;
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
    }
    .tooltip-text { 
      font-family: sans-serif; 
      font-size: 11px; 
      font-weight: 500; 
      fill: #fff; 
      text-anchor: middle; 
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
    }
    .sponsor-link:hover .initial { fill: #4F46E5; }
    .sponsor-link:hover .tooltip-bg { opacity: 1; }
    .sponsor-link:hover .tooltip-text { opacity: 1; }
  </style>

  <!-- 3Dっぽさを出すための厚み（側面のエクストルージョン） -->
  <!-- 下にずらしたレイヤーを重ねることで、滑らかな物理的厚みを表現 -->
  <g filter="url(#plateShadow)">
    <ellipse cx="400" cy="182" rx="320" ry="70" fill="none" stroke="url(#plateSideGrad)" stroke-width="64" />
    <ellipse cx="400" cy="180" rx="320" ry="70" fill="none" stroke="url(#plateSideGrad)" stroke-width="64" />
    <ellipse cx="400" cy="178" rx="320" ry="70" fill="none" stroke="url(#plateSideGrad)" stroke-width="64" />
    <ellipse cx="400" cy="176" rx="320" ry="70" fill="none" stroke="url(#plateSideGrad)" stroke-width="64" />
    <ellipse cx="400" cy="174" rx="320" ry="70" fill="none" stroke="url(#plateSideGrad)" stroke-width="64" />
    <ellipse cx="400" cy="172" rx="320" ry="70" fill="none" stroke="url(#plateSideGrad)" stroke-width="64" />
  </g>

  <!-- プレート上面（トップフェイス） -->
  <ellipse cx="400" cy="170" rx="320" ry="70" fill="none" stroke="url(#plateTopGrad)" stroke-width="64" />
  
  <!-- 面取り（ベベル）ハイライト＆シャドウでエッジをシャープに -->
  <!-- 外側のハイライト -->
  <ellipse cx="400" cy="170" rx="352" ry="102" fill="none" stroke="#FFFFFF" stroke-width="2" />
  <!-- 外側の微細な影 -->
  <ellipse cx="400" cy="170" rx="351" ry="101" fill="none" stroke="rgba(0,0,0,0.04)" stroke-width="1" />
  
  <!-- 内側のハイライト -->
  <ellipse cx="400" cy="170" rx="288" ry="38" fill="none" stroke="#FFFFFF" stroke-width="2" />
  <!-- 内側の微細な影 -->
  <ellipse cx="400" cy="170" rx="289" ry="39" fill="none" stroke="rgba(0,0,0,0.06)" stroke-width="1" />

  <!-- ロゴ群 -->
  <g>
    <!-- Logo 1 (TV) -->
    <a xlink:href="/bridge/companies/co-1" class="sponsor-link">
      <g>
        <animateMotion dur="25s" repeatCount="indefinite" begin="0s"><mpath xlink:href="#orbitPath" /></animateMotion>
        <g>
          <animate attributeName="opacity" dur="25s" repeatCount="indefinite" values="0.6;1;0.6;0.3;0.6" keyTimes="0;0.25;0.5;0.75;1" begin="0s" />
          <animateTransform attributeName="transform" type="scale" dur="25s" repeatCount="indefinite" values="0.85;1.1;0.85;0.7;0.85" keyTimes="0;0.25;0.5;0.75;1" begin="0s" />
          <text class="initial" y="0">TV</text>
          <rect class="tooltip-bg" x="-36" y="18" width="72" height="20" />
          <text class="tooltip-text" y="31">テクノバレー</text>
        </g>
      </g>
    </a>

    <!-- Logo 2 (NS) -->
    <a xlink:href="/bridge/companies/co-2" class="sponsor-link">
