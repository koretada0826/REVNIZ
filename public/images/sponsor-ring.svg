    <a xlink:href="/bridge/companies/co-1" class="sponsor-link">
      <g>
        <animateMotion dur="25s" repeatCount="indefinite" begin="0s">
          <mpath xlink:href="#orbitPath" />
        </animateMotion>
        <g>
          <animate attributeName="opacity" dur="25s" repeatCount="indefinite" values="1;0.6;0.3;0.6;1" keyTimes="0;0.25;0.5;0.75;1" begin="0s" />
          <animateTransform attributeName="transform" type="scale" dur="25s" repeatCount="indefinite" values="1.1;0.85;0.75;0.85;1.1" keyTimes="0;0.25;0.5;0.75;1" begin="0s" />
          <rect class="logo-frame logo-frame-anim" x="-32" y="-32" width="64" height="64" rx="12" style="animation-delay: 0s;" />
          <text class="initial initial-anim" y="0" style="animation-delay: 0s;">TV</text>
        </g>
